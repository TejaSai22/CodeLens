name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: uv sync --all-extras
      
    - name: Run tests
      run: uv run pytest tests/test_chunker.py tests/test_vector_store.py tests/test_repo_registry.py tests/test_api.py tests/test_integration.py tests/test_eval_metrics.py
