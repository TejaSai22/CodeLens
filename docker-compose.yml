services:
  backend:
    build:
      context: .
    image: codelens-backend
    env_file:
      - .env
    environment:
      # Allow the dockerized frontend origin to call the API.
      CORS_ORIGINS: "http://localhost:8080,http://localhost:5173"
      CHROMA_PERSIST_DIR: "/app/data/chroma_db"
    ports:
      - "8000:8000"
    volumes:
      - codelens-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 180s   # first boot downloads/loads the embedding model

  frontend:
    build:
      context: ./codelens-ui
      args:
        # Baked into the bundle at build time; this is the URL the browser uses.
        VITE_API_URL: "http://localhost:8000"
    image: codelens-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  codelens-data:
